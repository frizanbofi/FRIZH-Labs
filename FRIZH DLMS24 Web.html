<!DOCTYPE html>
<html>
<head>
  <title>FRIZH DLMS 24</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { background: #121212; color: #ddd; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 10px; }
    
    /* App Header & BLE Icon */
    .app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; border-bottom: 1px solid #333; margin-bottom: 15px; }
    .app-title { color: #00ffcc; font-size: 20px; font-weight: bold; letter-spacing: 2px; }
    #ble-btn { cursor: pointer; color: #555; transition: all 0.3s ease; padding: 5px; }
    #ble-btn.connected { color: #00ffcc; filter: drop-shadow(0 0 8px rgba(0,255,204,0.6)); }
    #ble-btn:hover { color: #fff; }

    .tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex: 1; padding: 10px; background: #222; text-align: center; cursor: pointer; border-radius: 5px; font-weight: bold; min-width: 60px; transition: 0.2s; border: 1px solid transparent; font-size: 13px; }
    .tab.active { background: #00ffcc; color: #000; box-shadow: 0 0 10px rgba(0,255,204,0.3); }
    
    .panel { display: none; background: #1a1a1a; padding: 15px; border-radius: 5px; border: 1px solid #333; }
    .panel.active { display: block; animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; }
    .control-group { background: #222; padding: 10px; border-radius: 5px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
    label { font-size: 11px; color: #888; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    input[type=range] { width: 100%; margin: 5px 0; cursor: pointer; accent-color: #00ffcc; }
    select { width: 100%; padding: 5px; background: #333; color: #fff; border: 1px solid #555; border-radius: 3px; cursor: pointer; outline: none; }
    select:focus { border-color: #00ffcc; }
    .val-display { float: right; color: #00ffcc; font-weight: bold; font-family: monospace; font-size: 12px; }
    
    /* Vertical VU Meter Styles */
    .pro-meters-grid { 
      display: flex; 
      justify-content: center; 
      gap: 12px; 
      padding: 10px 0; 
      height: 320px; 
      overflow-x: auto; 
    }
    .meter-unit {
      display: flex;
      align-items: flex-end;
      gap: 2px;
    }
    .meter-wrapper { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: flex-start;
    }
    .meter-title { font-weight: 800; color: #fff; font-size: 11px; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.7; }
    
    .pro-meter-container { 
      width: 30px; 
      height: 180px; 
      background: #000; 
      border-radius: 2px; 
      position: relative; 
      overflow: hidden; 
      border: 1px solid #333; 
    }
    .pro-meter-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: linear-gradient(to top, #004400 0%, #00cc00 60%, #e6e600 80%, #ff0000 100%); transition: height 0.08s ease-out; }
    .pro-meter-marks { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(to top, transparent, transparent 3px, #0a0a0a 3px, #0a0a0a 4px); pointer-events: none; }
    
    /* DB Scale */
    .scale-wrapper { display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; height: 100%; padding-right: 5px; }
    .meter-row {
      display: flex;
      align-items: flex-start;
      gap: 2px;
    }
    .db-scale-container { 
      position: relative; 
      height: 180px; 
      width: 24px; 
    }
    .db-scale-container span { 
      position: absolute; 
      right: 2px; 
      font-size: 9px; 
      font-weight: bold; 
      transform: translateY(-50%); 
      font-family: monospace; 
      line-height: 1;
    }
    .db-val-12  { top: 0%; color: #ff5555; }
    .db-val-0   { top: 23.1%; color: #ffcc00; }
    .db-val-m10 { top: 42.3%; color: #44ff44; }
    .db-val-m20 { top: 61.5%; color: #aaaaaa; }
    .db-val-m40 { top: 100%; color: #666666; }

    .meter-wrapper { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
    }
    
    .meter-indicators { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; width: 100%; align-items: center; }
    .scale-indicators-dummy { visibility: hidden; } /* To keep alignment with other wrappers */
    
    .led { width: 32px; text-align: center; padding: 3px 0; border-radius: 3px; font-size: 8px; font-weight: 900; letter-spacing: 0.5px; color: #444; background: #222; border: 1px solid #111; opacity: 0.6; transition: all 0.1s; box-sizing: border-box; }
    .led.active { opacity: 1; color: #fff; }
    .led-mute.active { background: #e60000; border-color: #ff3333; box-shadow: 0 0 8px #e60000; }
    .led-clip.active { background: #ff0000; border-color: #ff6666; box-shadow: 0 0 10px #ff0000; color: #fff; }
    .led-comp.active { background: #ffaa00; border-color: #ffcc00; box-shadow: 0 0 8px #ffaa00; color: #000; }
    .led-placeholder { height: 16px; width: 32px; } 

    canvas { background: #000; width: 100%; height: 140px; border-radius: 5px; border: 1px solid #444; margin: 15px 0; display: block; box-shadow: inset 0 0 10px rgba(0,255,204,0.1); }
    
    .btn-revert { background: #444; color: #fff; border: 1px solid #666; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; float: right; transition: 0.2s; }
    .btn-revert:hover { background: #555; }
    .btn-mute { background: #333; color: #fff; border: 1px solid #555; padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 11px; font-weight: bold; width: 100%; transition: 0.2s; }
    .btn-mute:hover { background: #444; }
    .btn-mute.active { background: #f55; color: #fff; border-color: #f00; box-shadow: 0 0 8px rgba(255,0,0,0.6); }
    .btn-row { display: flex; gap: 10px; margin-bottom: 10px; width: 100%; }
    
    .section-header { background: #2a2a2a; padding: 10px 12px; margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px 4px 0 0; color: #00ffcc; font-size: 0.85em; font-weight: bold; border: 1px solid #333; border-bottom: none; }
    .edit-toggle-wrap { display: flex; align-items: center; gap: 8px; font-size: 0.8em; color: #aaa; }
    .edit-toggle-wrap input { width: 14px; height: 14px; cursor: pointer; accent-color: #00ffcc; }
    .dsp-section { background: #1a1a1a; padding: 12px; border: 1px solid #333; border-top: 1px solid #222; border-radius: 0 0 4px 4px; transition: opacity 0.2s; }
    .dsp-section.locked { opacity: 0.4; pointer-events: none; filter: grayscale(50%); }
    
    /* BLE Overlays & Dialogs */
    #connect-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(18,18,18,0.95); z-index:9998; display:flex; justify-content:center; align-items:center; flex-direction:column; backdrop-filter: blur(5px); }
    .btn-connect { padding:15px 30px; font-size:16px; background:#00ffcc; color:#000; border:none; border-radius:5px; cursor:pointer; font-weight:bold; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.4); transition: 0.2s; letter-spacing: 1px; }
    .btn-connect:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 255, 204, 0.6); }
    .btn-connect:active { transform: translateY(1px); }

    #ble-dialog-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; display:none; justify-content:center; align-items:center; backdrop-filter: blur(3px); }
    .ble-dialog { background:#1a1a1a; padding:25px; border-radius:8px; border:1px solid #333; text-align:center; min-width: 280px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .ble-dialog h3 { color:#00ffcc; margin-top:0; letter-spacing: 1px; font-size: 16px; }
    .ble-dialog p { color: #aaa; font-size: 13px; margin-bottom: 20px; }
    .ble-btn-row { display:flex; flex-direction:column; gap:10px; }
    .ble-dialog button { padding:12px; border:none; border-radius:4px; cursor:pointer; font-weight:bold; font-size: 13px; letter-spacing: 0.5px; transition: 0.2s; }
    .btn-switch { background:#00ffcc; color:#000; }
    .btn-switch:hover { background:#00e6b8; }
    .btn-dc { background:#ff3333; color:#fff; }
    .btn-dc:hover { background:#e60000; }
    .btn-cancel { background:#333; color:#fff; border: 1px solid #555 !important; }
    .btn-cancel:hover { background:#444; }
  </style>
</head>
<body>

  <div id="connect-overlay">
    <div style="font-size: 28px; font-weight: bold; color: #00ffcc; letter-spacing: 2px; margin-bottom: 30px;">FRIZH DLMS 24</div>
    <button class="btn-connect" onclick="connectBLE()">SCAN & CONNECT</button>
    <p style="color:#888; margin-top:20px; text-align:center; font-size: 13px; line-height: 1.6;">Ensure Bluetooth is enabled on your device.<br>Requires Google Chrome, Edge, or a WebBLE supported browser.</p>
  </div>

  <div id="ble-dialog-overlay">
    <div class="ble-dialog">
      <h3>DEVICE STATUS</h3>
      <p id="ble-connected-name">Connected to: Unknown</p>
      <div class="ble-btn-row">
        <button class="btn-switch" onclick="switchDevice()">SWITCH DEVICE</button>
        <button class="btn-dc" onclick="disconnectBLE()">DISCONNECT</button>
        <button class="btn-cancel" onclick="closeBleDialog()">CANCEL</button>
      </div>
    </div>
  </div>

  <div class="app-header">
    <div class="app-title">FRIZH DLMS 24</div>
    <div id="ble-btn" onclick="handleBleIconClick()" title="Bluetooth Options">
      <svg viewBox="0 0 24 24" width="26" height="26" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6.5 6.5 17.5 17.5 12 23 12 1 17.5 6.5 6.5 17.5"></polyline>
      </svg>
    </div>
  </div>
  
  <div class="tabs" id="tabs">
    <div class="tab active" onclick="switchTab('t-meters')">MONITOR</div>
    <div class="tab" onclick="switchTab('t-inA')">IN A</div>
    <div class="tab" onclick="switchTab('t-inB')">IN B</div>
    <div class="tab" onclick="switchTab('t-out1')">OUT 1</div>
    <div class="tab" onclick="switchTab('t-out2')">OUT 2</div>
    <div class="tab" onclick="switchTab('t-out3')">OUT 3</div>
    <div class="tab" onclick="switchTab('t-out4')">OUT 4</div>
  </div>

  <div id="t-meters" class="panel active"><div id="meter-grid"></div></div>
  <div id="t-inA" class="panel"><button class="btn-revert" onclick="revertTab('in', 0)">Reset A</button><div class="grid" id="ui-inA"></div></div>
  <div id="t-inB" class="panel"><button class="btn-revert" onclick="revertTab('in', 1)">Reset B</button><div class="grid" id="ui-inB"></div></div>
  <div id="t-out1" class="panel"></div>
  <div id="t-out2" class="panel"></div>
  <div id="t-out3" class="panel"></div>
  <div id="t-out4" class="panel"></div>

  <script>
    let dspState = {};
    let initialState = null;
    let timers = {};
    
    // Web Bluetooth Variables
    let bleDevice, bleServer, bleService, rxChar, txChar;
    let bleQueue = [];
    let isWriting = false;
    let jsonBuffer = "";

    function handleBleIconClick() {
      if (bleDevice && bleDevice.gatt.connected) {
         document.getElementById('ble-connected-name').innerText = "Connected to:\n" + (bleDevice.name || "FRIZH_DLMS24_...");
         document.getElementById('ble-dialog-overlay').style.display = 'flex';
      } else {
         connectBLE();
      }
    }

    function closeBleDialog() {
        document.getElementById('ble-dialog-overlay').style.display = 'none';
    }

    function disconnectBLE() {
        if (bleDevice && bleDevice.gatt.connected) {
            bleDevice.gatt.disconnect();
        }
        closeBleDialog();
    }

    async function switchDevice() {
        disconnectBLE();
        // Short delay to allow disconnect to settle before opening browser device picker again
        setTimeout(() => { connectBLE(); }, 400); 
    }

    async function connectBLE() {
      try {
        bleDevice = await navigator.bluetooth.requestDevice({
          filters: [{ namePrefix: 'FRIZH_DLMS24_' }], 
          optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
        });
        
        bleDevice.addEventListener('gattserverdisconnected', () => { 
            document.getElementById('ble-btn').classList.remove('connected');
            document.getElementById('connect-overlay').style.display = 'flex'; 
        });

        bleServer = await bleDevice.gatt.connect();
        bleService = await bleServer.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
        rxChar = await bleService.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
        txChar = await bleService.getCharacteristic('6e400003-b5a3-f393-e0a9-e50e24dcca9e');
        
        await txChar.startNotifications();
        txChar.addEventListener('characteristicvaluechanged', handleNotifications);
        
        document.getElementById('connect-overlay').style.display = 'none';
        document.getElementById('ble-btn').classList.add('connected');
        closeBleDialog(); // Ensure dialog is closed if connected from switch mode

        sendBLE('/api/dump');

      } catch(e) { 
        console.error("BLE Error:", e);
        if (e.name !== 'NotFoundError') {
            alert("Bluetooth Connection Failed. Please ensure your device supports Web Bluetooth.");
        }
      }
    }

    async function processBleQueue() {
      if(isWriting || bleQueue.length === 0 || !rxChar) return;
      isWriting = true;
      let cmd = bleQueue.shift();
      try {
        let enc = new TextEncoder();
        await rxChar.writeValueWithoutResponse(enc.encode(cmd));
      } catch(e) { console.log("BLE Write Error", e); }
      isWriting = false;
      setTimeout(processBleQueue, 15); 
    }

    function sendBLE(cmd) {
      bleQueue.push(cmd);
      processBleQueue();
    }

    function handleNotifications(event) {
      let val = new TextDecoder().decode(event.target.value);
      
      if(val.startsWith("S:")) {
        let p = val.substring(2).split(',');

        if(document.getElementById('t-meters').classList.contains('active')) {
          for(let i=0; i<6; i++) {
            let floatPeak = parseFloat(p[i]) || 1e-9;
            let db = 20 * Math.log10(floatPeak) + 10;
            
            // Replicating Flutter DBScale logic: -40dB to +12dB (Range of 52dB)
            let pct = Math.max(0, Math.min(100, (db + 40) * (100 / 52)));
            
            let mtr = document.getElementById(`mtr-${i}`);
            if(mtr) mtr.style.height = pct + '%';
            
            let clipLed = document.getElementById(`ind-clip-${i}`);
            if(clipLed) clipLed.classList.toggle('active', floatPeak >= 0.99);
          }
        }
        
        if (dspState.in_mute !== undefined) {
          for(let i=0; i<2; i++) {
            dspState.in_mute[i] = (p[6+i] === '1');
            let btn = document.getElementById(`btn-mute-in-${i}`);
            if(btn) btn.classList.toggle('active', dspState.in_mute[i]);
            
            let muteLed = document.getElementById(`ind-mute-${i}`);
            if(muteLed) muteLed.classList.toggle('active', dspState.in_mute[i]);
          }
          for(let i=0; i<4; i++) {
            dspState.out_mute[i] = (p[8+i] === '1');
            let btn = document.getElementById(`btn-mute-out-${i}`);
            if(btn) btn.classList.toggle('active', dspState.out_mute[i]);
            
            let muteLed = document.getElementById(`ind-mute-${i+2}`);
            if(muteLed) muteLed.classList.toggle('active', dspState.out_mute[i]);
            
            let compLed = document.getElementById(`ind-comp-${i+2}`);
            if(compLed) compLed.classList.toggle('active', p[12+i] === '1');
          }
        }
      } else if (val.startsWith("J:")) {
        jsonBuffer += val.substring(2);
        if(jsonBuffer.endsWith("}")) {
          try {
              dspState = JSON.parse(jsonBuffer);
              initialState = JSON.stringify(dspState);
              buildUI();
          } catch(e) { console.log("JSON Parse err", e); }
          jsonBuffer = "";
        }
      }
    }

    function toggleMute(type, ch) {
      let isMuted = false;
      if (type === 'in') {
          dspState.in_mute[ch] = !dspState.in_mute[ch];
          isMuted = dspState.in_mute[ch];
      } else {
          dspState.out_mute[ch] = !dspState.out_mute[ch];
          isMuted = dspState.out_mute[ch];
      }
      document.getElementById(`btn-mute-${type}-${ch}`).classList.toggle('active', isMuted);
      sendBLE(`/api/mute?type=${type}&ch=${ch}`);
    }

    function switchTab(id) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.target.classList.add('active');
      if(id.startsWith('t-out')) drawGraph(parseInt(id.slice(-1)) - 1);
    }

    function sendUpdate(type, ch, param, val, band = '') {
      clearTimeout(timers[type+ch+param+band]);
      timers[type+ch+param+band] = setTimeout(() => {
        let url = `/api/set?type=${type}&ch=${ch}&p=${param}&v=${val}${band !== '' ? '&b='+band : ''}`;
        sendBLE(url);
      }, 50);
    }

    function handleSliderInput(el) {
      let type = el.getAttribute('data-type');
      let ch = parseInt(el.getAttribute('data-ch'));
      let p = el.getAttribute('data-p');
      let b = el.getAttribute('data-b');
      let unit = el.getAttribute('data-unit');
      let step = el.getAttribute('step');
      let isFreq = (p === 'f' || p === 'fl' || p === 'fh');
      
      let realVal = parseFloat(el.value);
      if (isFreq) {
         let min = parseFloat(el.getAttribute('data-min'));
         let max = parseFloat(el.getAttribute('data-max'));
         let logMin = Math.log10(min);
         let logMax = Math.log10(max);
         realVal = Math.pow(10, logMin + (realVal / 1000) * (logMax - logMin));
         if(realVal > 10000) realVal = Math.round(realVal / 100) * 100;
         else if(realVal > 1000) realVal = Math.round(realVal / 10) * 10;
         else realVal = Math.round(realVal);
      }

      let displayVal = realVal.toFixed((unit === '' || step === '0.1') ? 1 : 0) + unit;
      if (type === 'dl' || type === 'idl') {
          let dist = (realVal * 34.3).toFixed(1);
          displayVal = realVal.toFixed(1) + 'ms / ' + dist + 'cm';
      }
      
      if (type === 'comp' && p === 'thr' && realVal === 7) displayVal = "OFF";
      if (type === 'comp' && p === 'rat' && realVal === 21) displayVal = "LIM";

      el.parentElement.querySelector('.val-display').innerText = displayVal;
      sendUpdate(type, ch, p, realVal, b);
      if (type === 'xo' || type === 'eq') drawGraph(ch);
    }

    function createSlider(label, type, ch, param, min, max, val, unit, band = '', step = '1') {
      let id = `${type}_${param}_${ch}${band !== '' ? '_' + band : ''}`;
      let isFreq = (param === 'f' || param === 'fl' || param === 'fh');
      let displayVal = parseFloat(val).toFixed((unit === '' || step === '0.1') ? 1 : 0) + unit;
      
      if(type === 'dl' || type === 'idl') {
          let dist = (parseFloat(val) * 34.3).toFixed(1);
          displayVal = parseFloat(val).toFixed(1) + 'ms / ' + dist + 'cm';
      }
      
      if (type === 'comp' && param === 'thr' && parseInt(val) === 7) displayVal = "OFF";
      if (type === 'comp' && param === 'rat' && parseInt(val) === 21) displayVal = "LIM";
      
      let htmlVal = val, htmlMin = min, htmlMax = max, htmlStep = step;
      if (isFreq) {
         htmlMin = 0;
         htmlMax = 1000; htmlStep = 1;
         htmlVal = ((Math.log10(val) - Math.log10(min)) / (Math.log10(max) - Math.log10(min))) * 1000;
      }

      return `
        <div class="control-group">
          <label>${label} <span class="val-display">${displayVal}</span></label>
          <input type="range" id="${id}" data-type="${type}" data-ch="${ch}" data-p="${param}" data-b="${band}" data-min="${min}" data-max="${max}" data-unit="${unit}" min="${htmlMin}" max="${htmlMax}" step="${htmlStep}" value="${htmlVal}" 
            oninput="handleSliderInput(this)">
        </div>`;
    }

    function createSelect(label, type, ch, param, options, val) {
      let id = `${type}_${param}_${ch}`;
      let opts = options.map((o, i) => `<option value="${i}" ${i==val?'selected':''}>${o}</option>`).join('');
      return `
        <div class="control-group">
          <label>${label}</label>
          <select id="${id}" onchange="sendUpdate('${type}', ${ch}, '${param}', this.value); if('${type}'=='xo') drawGraph(${ch});">${opts}</select>
        </div>`;
    }

    function getRealFreq(el) {
      if(!el) return 20;
      let min = parseFloat(el.getAttribute('data-min'));
      let max = parseFloat(el.getAttribute('data-max'));
      let val = parseFloat(el.value);
      let logMin = Math.log10(min);
      let logMax = Math.log10(max);
      return Math.pow(10, logMin + (val / 1000) * (logMax - logMin));
    }

    function drawGraph(ch) {
      let cvs = document.getElementById(`cvs-${ch}`);
      if(!cvs || cvs.offsetParent === null) return;
      let ctx = cvs.getContext('2d', { alpha: false });
      let w = cvs.width, h = cvs.height;
      
      ctx.fillStyle = "#000"; ctx.fillRect(0,0,w,h);
      ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
      for(let i=1; i<4; i++) { ctx.beginPath(); ctx.moveTo(0, h*i/4); ctx.lineTo(w, h*i/4); ctx.stroke(); }

      ctx.strokeStyle = '#00ffcc';
      ctx.lineWidth = 2; ctx.beginPath();
      
      let logMin = Math.log10(20), logMax = Math.log10(20000);
      
      let xo_t = parseInt(document.getElementById(`xo_t_${ch}`).value);
      let xo_th = parseInt(document.getElementById(`xo_th_${ch}`).value);
      let f_low = getRealFreq(document.getElementById(`xo_fl_${ch}`));
      let f_high = getRealFreq(document.getElementById(`xo_fh_${ch}`));
      let g_off = parseFloat(document.getElementById(`xo_g_${ch}`).value);
      
      let orderL = [2.0, 2.0, 4.0, 8.0, 2.0, 4.0, 8.0][xo_t] || 2.0;
      let orderH = [2.0, 2.0, 4.0, 8.0, 2.0, 4.0, 8.0][xo_th] || 2.0;
      
      for(let x=0; x<w; x+=2) {
        let f = Math.pow(10, logMin + (x/w)*(logMax-logMin));
        let total_db = g_off;
        
        if(xo_t > 0) total_db += -10*Math.log10(1+Math.pow(f_low/f, 2*orderL));
        if(xo_th > 0) total_db += -10*Math.log10(1+Math.pow(f/f_high, 2*orderH));
        
        for(let b=0; b<7; b++) {
          let g = parseFloat(document.getElementById(`eq_g_${ch}_${b}`).value);
          if(g == 0) continue;
          let fc = getRealFreq(document.getElementById(`eq_f_${ch}_${b}`));
          let q = parseFloat(document.getElementById(`eq_q_${ch}_${b}`).value);
          let xc = (Math.log10(fc)-logMin)/(logMax-logMin) * w;
          let dx = x - xc;
          let bw = (9.0 / q) * (w / 123.0);
          total_db += g / (1.0 + (dx*dx)/(Math.max(0.2, bw*bw)));
        }
        
        let y = h/2 - (total_db * (h/48));
        if(x==0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
      }
      ctx.stroke();
    }

    const wrapSection = (title, content, id, rstAction = '') => `
      <div class="section-header">
        <span>${title}</span>
        <div class="edit-toggle-wrap">
          ${rstAction !== '' ? `<button style="background:#522; color:#fff; border:1px solid #f55; border-radius:3px; padding:2px 8px; font-weight:bold; font-size:9px; cursor:pointer;" onclick="${rstAction}">RST</button>` : ''}
          <label style="margin:0; font-size:10px;">EDIT</label>
          <input type="checkbox" onchange="document.getElementById('${id}').classList.toggle('locked', !this.checked)">
        </div>
      </div>
      <div id="${id}" class="dsp-section locked">${content}</div>`;

    function buildUI() {
      // Build Vertical VU Meters grid
      let mHtml = '<div class="pro-meters-grid">';
      
      const labels = ['IN A', 'IN B', 'OUT 1', 'OUT 2', 'OUT 3', 'OUT 4'];
      
      labels.forEach((lbl, i) => {
        let isOut = i >= 2;
        let muteCls = (isOut ? dspState.out_mute[i-2] : dspState.in_mute[i]) ? 'led-mute active' : 'led-mute';
        
        mHtml += `
        <div class="meter-wrapper">
            <span class="meter-title">${lbl}</span>
            
            <div class="meter-row">
                <div class="db-scale-container">
                    <span class="db-val-12">+12</span>
                    <span class="db-val-0">0</span>
                    <span class="db-val-m10">-10</span>
                    <span class="db-val-m20">-20</span>
                    <span class="db-val-m40">-40</span>
                </div>
                
                <div class="pro-meter-container">
                    <div id="mtr-${i}" class="pro-meter-fill"></div>
                    <div class="pro-meter-marks"></div>
                </div>
            </div>

            <div class="meter-indicators">
                ${isOut ? `<span id="ind-comp-${i}" class="led led-comp">COMP</span>` : '<span class="led-placeholder"></span>'}
                <span id="ind-mute-${i}" class="led ${muteCls}">MUTE</span>
                <span id="ind-clip-${i}" class="led led-clip">CLIP</span>
            </div>
        </div>`;
      });
      
      mHtml += '</div>';
      document.getElementById('meter-grid').innerHTML = mHtml;

      // ... (Rest of the buildUI function for Inputs/Outputs remains the same)
      ['A', 'B'].forEach((name, i) => {
        let tab = document.getElementById('t-in' + name);
        if(!tab) return;
        let content = createSlider('Gain', 'in', i, 'gn', -12, 12, i==0 ? dspState.vA : dspState.vB, 'dB') +
                      createSlider('Gate Thresh', 'gate', i, 'thr', -60, 0, dspState.gth[i], 'dB') +
                      createSlider('Attack', 'gate', i, 'atk', 1, 100, dspState.gat[i], 'ms') +
                      createSlider('Release', 'gate', i, 'rel', 10, 1000, dspState.gre[i], 'ms') +
                      createSlider('Delay', 'idl', i, '', 0, 200, dspState.idl[i], 'ms', '', '0.1');

        let inMuteCls = dspState.in_mute[i] ? 'btn-mute active' : 'btn-mute';
        tab.innerHTML = `<div class="btn-row">
                           <button id="btn-mute-in-${i}" class="${inMuteCls}" onclick="toggleMute('in', ${i})">MUTE IN ${name}</button>
                           <button class="btn-revert" style="width:100%" onclick="revertTab('in', ${i})">RESET IN ${name}</button>
                         </div>` + wrapSection(`INPUT ${name} SETTINGS`, `<div class="grid">${content}</div>`, `sec-in-${name}`);
      });

      for(let i=0; i<4; i++) {
        let tab = document.getElementById('t-out' + (i+1));
        if(!tab) continue;
        let routeContent = `<div class="grid">
          ${createSelect('Route', 'rt', i, '', ['OFF', 'IN A', 'IN B', 'MIX'], dspState.rt[i])}
          ${createSelect('Phase', 'ph', i, '', ['NORMAL', 'INVERT'], dspState.ph[i])}
          ${createSlider('Delay', 'dl', i, '', 0, 200, dspState.dl[i], 'ms', '', '0.1')}
        </div>
        <div style="margin-top:15px; color:#00ffcc; font-size:11px; font-weight:bold; margin-bottom:10px; letter-spacing:0.5px;">ALL-PASS FILTER (PHASE ALIGN)</div>
        <div class="grid">
          ${createSelect('Enable APF', 'apf', i, 'e', ['BYPASS', 'ACTIVE'], dspState.apfe[i])}
          ${createSlider('APF Freq', 'apf', i, 'f', 20, 20000, dspState.apff[i], 'Hz', '', '10')}
          ${createSlider('APF Q', 'apf', i, 'q', 0.1, 10, dspState.apfq[i], '', '', '0.1')}
        </div>`;

        let xoContent = `<div class="grid">
          ${createSelect('HPF Slope', 'xo', i, 't', ['OFF', 'BW12', 'BW24', 'BW48', 'LR12', 'LR24', 'LR48'], dspState.xt[i])}
          ${createSelect('LPF Slope', 'xo', i, 'th', ['OFF', 'BW12', 'BW24', 'BW48', 'LR12', 'LR24', 'LR48'], dspState.xth[i])}
          ${createSlider('HPF Freq', 'xo', i, 'fl', 20, 20000, dspState.xfl[i], 'Hz', '', '10')}
          ${createSlider('LPF Freq', 'xo', i, 'fh', 20, 20000, dspState.xfh[i], 'Hz', '', '10')}
          ${createSlider('Gain', 'xo', i, 'g', -12, 6, dspState.xo_gn[i], 'dB')}
        </div>`;

        let eqContent = `<div class="grid">`;
        for(let b=0; b<7; b++) {
          eqContent += `
            <div style="grid-column: 1 / -1; display:flex; gap:8px; background:#111; padding:8px; margin-bottom:4px; border-radius:4px; border:1px solid #222;">
              <div style="flex:2">${createSlider(`B${b+1}`, 'eq', i, 'f', 20, 20000, dspState.eqf[i][b], 'Hz', b, '10')}</div>
              <div style="flex:1">${createSlider(`G`, 'eq', i, 'g', -12, 12, dspState.eq_gn[i][b], 'dB', b)}</div>
              <div style="flex:1">${createSlider(`Q`, 'eq', i, 'q', 0.1, 10, dspState.eqq[i][b], '', b, '0.1')}</div>
            </div>`;
        }
        eqContent += `</div>`;
        
        let compContent = `<div class="grid">
            ${createSlider('Thresh', 'comp', i, 'thr', -30, 7, dspState.ct[i], 'dB')}
            ${createSlider('Ratio', 'comp', i, 'rat', 1, 21, dspState.cr[i], ':1')}
            ${createSlider('Makeup', 'comp', i, 'mak', 0, 20, dspState.cm[i], 'dB')}
            ${createSlider('Attack', 'comp', i, 'atk', 1, 100, dspState.ca[i], 'ms')}
            ${createSlider('Release', 'comp', i, 'rel', 10, 1000, dspState.crel[i], 'ms', '', '10')}
          </div>`;

        let outMuteCls = dspState.out_mute[i] ? 'btn-mute active' : 'btn-mute';
        tab.innerHTML = `<div class="btn-row">
                           <button id="btn-mute-out-${i}" class="${outMuteCls}" onclick="toggleMute('out', ${i})">MUTE OUT ${i+1}</button>
                           <button class="btn-revert" style="width:100%" onclick="revertTab('out', ${i})">RESET ALL OUT ${i+1}</button>
                         </div>` +
                        wrapSection("ROUTING & PHASE", routeContent, `sec-rt-${i}`) +
                        wrapSection("BAND-PASS CROSSOVER", xoContent, `sec-xo-${i}`, `revertBlock(${i}, 'xo')`) +
                        `<canvas id="cvs-${i}" width="400" height="140"></canvas>` +
                        wrapSection("7-BAND PEQ", eqContent, `sec-eq-${i}`, `revertBlock(${i}, 'eq')`) +
                        wrapSection("COMPRESSOR", compContent, `sec-comp-${i}`, `revertBlock(${i}, 'comp')`);
        
        drawGraph(i);
      }
    }

    async function revertTab(type, ch) {
      if(!confirm(`Reset entire ${type.toUpperCase()} Channel ${type === 'in' ? (ch === 0 ? 'A' : 'B') : ch + 1} to default flat values?`)) return;
      if (type === 'in') {
          sendBLE(`/api/set?type=in&ch=${ch}&v=0`);
          sendBLE(`/api/set?type=gate&ch=${ch}&p=thr&v=-60`);
          sendBLE(`/api/set?type=gate&ch=${ch}&p=atk&v=10`);
          sendBLE(`/api/set?type=gate&ch=${ch}&p=rel&v=200`);
          sendBLE(`/api/set?type=idl&ch=${ch}&v=0`);
      } else if (type === 'out') {
          sendBLE(`/api/set?type=rt&ch=${ch}&v=${(ch%2)+1}`);
          sendBLE(`/api/set?type=ph&ch=${ch}&v=0`);
          sendBLE(`/api/set?type=dl&ch=${ch}&v=0`);
          sendBLE(`/api/set?type=apf&ch=${ch}&p=e&v=0`);
          sendBLE(`/api/set?type=apf&ch=${ch}&p=f&v=1000`);
          sendBLE(`/api/set?type=apf&ch=${ch}&p=q&v=0.7`);
          
          revertBlock(ch, 'xo', true);
          revertBlock(ch, 'eq', true);
          revertBlock(ch, 'comp', true);
      }
      sendBLE('/api/dump');
    }

    async function revertBlock(ch, block, skipConfirm = false) {
      if(!skipConfirm && !confirm(`Reset this DSP section to default flat values?`)) return;
      if (block === 'xo') {
        sendBLE(`/api/set?type=xo&ch=${ch}&p=t&v=0`);
        sendBLE(`/api/set?type=xo&ch=${ch}&p=th&v=0`);
        sendBLE(`/api/set?type=xo&ch=${ch}&p=fl&v=80`);
        sendBLE(`/api/set?type=xo&ch=${ch}&p=fh&v=5000`);
        sendBLE(`/api/set?type=xo&ch=${ch}&p=g&v=0`);
      } else if (block === 'eq') {
        const defFreqs = [60, 150, 400, 1000, 2400, 6000, 12000];
        for(let b=0; b<7; b++) {
          sendBLE(`/api/set?type=eq&ch=${ch}&p=f&b=${b}&v=${defFreqs[b]}`);
          sendBLE(`/api/set?type=eq&ch=${ch}&p=g&b=${b}&v=0`);
          sendBLE(`/api/set?type=eq&ch=${ch}&p=q&b=${b}&v=1.41`);
        }
      } else if (block === 'comp') {
        sendBLE(`/api/set?type=comp&ch=${ch}&p=thr&v=-20`);
        sendBLE(`/api/set?type=comp&ch=${ch}&p=rat&v=4`);
        sendBLE(`/api/set?type=comp&ch=${ch}&p=mak&v=0`);
        sendBLE(`/api/set?type=comp&ch=${ch}&p=atk&v=10`);
        sendBLE(`/api/set?type=comp&ch=${ch}&p=rel&v=100`);
      }

      if (!skipConfirm) sendBLE('/api/dump');
    }
  </script>

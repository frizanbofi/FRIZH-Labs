<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIZH Labs | DLMS24 System Control</title>
    <style>
        :root {
            --bg-main: #0B0C10;
            --bg-card: #1F2833;
            --accent-cyan: #45A29E;
            --accent-hover: #66FCF1;
            --text-light: #C5C6C7;
            --text-white: #FFFFFF;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: var(--bg-card);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(102, 252, 241, 0.1);
        }

        img {
            max-width: 90px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(102, 252, 241, 0.2));
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            color: var(--accent-hover);
            font-weight: 600;
        }

        .device-info {
            margin: 25px 0;
            padding: 15px;
            background: rgba(11, 12, 16, 0.5);
            border-radius: 8px;
            border-left: 3px solid var(--accent-cyan);
        }

        .model-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-white);
            display: block;
            margin-bottom: 5px;
        }

        .version-tag {
            display: inline-block;
            color: var(--accent-cyan);
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        /* Form Controls */
        .download-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 25px;
            text-align: left;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-left: 5px;
        }

        select {
            width: 100%;
            padding: 14px;
            background-color: var(--bg-main);
            color: var(--text-white);
            border: 1px solid rgba(69, 162, 158, 0.3);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2345A29E%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
            transition: border-color 0.3s;
        }

        select:focus {
            border-color: var(--accent-hover);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 15px;
        }

        .btn {
            display: block;
            padding: 14px 20px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
        }

        /* APK Button (Solid) */
        .apk-btn {
            background-color: var(--accent-cyan);
            color: var(--bg-main);
        }

        .apk-btn:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 252, 241, 0.3);
        }

        .apk-btn:disabled {
            background-color: #333;
            color: #777;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Web UI Button (Outlined) */
        .web-btn {
            background-color: transparent;
            color: var(--accent-hover);
            border: 2px solid var(--accent-cyan);
        }

        .web-btn:hover {
            background-color: rgba(69, 162, 158, 0.1);
            border-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .divider {
            margin: 25px 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(69, 162, 158, 0.3), transparent);
        }

        .footer-text {
            font-size: 0.75rem;
            color: #888;
            margin-top: 25px;
            line-height: 1.6;
        }

        /* Loader */
        #loader {
            font-size: 0.85rem;
            color: var(--accent-cyan);
            display: none;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Frizh Logo" onerror="this.style.display='none'">
        
        <h1>FRIZH Labs</h1>
        
        <div class="device-info">
            <span class="model-name">FRIZH DLMS24</span>
            <span class="version-tag">Digital Loudspeaker Management System</span>
        </div>

        <div class="download-group">
            <label for="version-select">Select App Version:</label>
            <select id="version-select">
                <option value="">Fetching releases...</option>
            </select>
            <span id="loader">Checking GitHub...</span>
            
            <button id="download-btn" class="btn apk-btn" disabled onclick="downloadAPK()">
                Download .APK
            </button>
        </div>

        <div class="divider"></div>

        <div class="btn-group">
            <a href="FRIZH%20DLMS24%20Web.html" class="btn web-btn">
                Launch Web Bluetooth UI
            </a>
        </div>
        
        <div class="footer-text">
            Web UI is Optimized for Real-Time Bluetooth Controller<br>
            Requires Google Chrome or Microsoft Edge<br>
            Android App requires Android 8.0+
        </div>
    </div>

    <script>
        const REPO_OWNER = 'FRIZH-Labs';
        const REPO_NAME = 'FRIZH-Labs';
        const API_URL = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases`;

        async function fetchReleases() {
            const select = document.getElementById('version-select');
            const downloadBtn = document.getElementById('download-btn');
            const loader = document.getElementById('loader');

            loader.style.display = 'block';

            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const releases = await response.json();
                select.innerHTML = ''; 
                let foundApk = false;

                releases.forEach(release => {
                    // Look for any asset that ends with .apk
                    const apkAsset = release.assets.find(asset => asset.name.toLowerCase().endsWith('.apk'));
                    
                    if (apkAsset) {
                        foundApk = true;
                        const option = document.createElement('option');
                        option.value = apkAsset.browser_download_url;
                        // Format: v1.0.0 (Size MB)
                        const sizeMB = (apkAsset.size / (1024 * 1024)).toFixed(2);
                        option.textContent = `${release.name || release.tag_name} - ${apkAsset.name} (${sizeMB} MB)`;
                        select.appendChild(option);
                    }
                });

                if (foundApk) {
                    downloadBtn.disabled = false;
                } else {
                    select.innerHTML = '<option value="">No APK versions found</option>';
                    downloadBtn.disabled = true;
                }
            } catch (error) {
                console.error('Error fetching GitHub releases:', error);
                select.innerHTML = '<option value="">Error loading versions</option>';
                downloadBtn.disabled = true;
            } finally {
                loader.style.display = 'none';
            }
        }

        function downloadAPK() {
            const select = document.getElementById('version-select');
            const url = select.value;
            if (url) {
                window.location.href = url;
            }
        }

        // Initialize fetching on page load
        document.addEventListener('DOMContentLoaded', fetchReleases);
    </script>
</body>
</html>

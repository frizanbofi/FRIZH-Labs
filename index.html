<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIZH Labs | DLMS24</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --cyan-accent: #22d3ee;
            --cyan-glow: rgba(34, 211, 238, 0.3);
            --text-main: #f8fafc;
        }

        body {
            background: radial-gradient(circle at top, #1e293b 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 8px var(--cyan-glow)); }
        
        h1 { font-size: 1.5rem; letter-spacing: 4px; margin: 0; color: var(--cyan-accent); text-transform: uppercase; }
        
        .status-badge {
            display: inline-block;
            background: rgba(34, 211, 238, 0.1);
            color: var(--cyan-accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            border: 1px solid var(--cyan-accent);
            margin-top: 10px;
        }

        .selection-box { margin-top: 30px; text-align: left; }
        
        label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 8px; display: block; margin-left: 5px; }

        select {
            width: 100%;
            background: #0f172a;
            color: white;
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 12px;
            outline: none;
            cursor: pointer;
            transition: 0.2s;
        }

        select:focus { border-color: var(--cyan-accent); box-shadow: 0 0 0 2px var(--cyan-glow); }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            text-decoration: none;
            margin-top: 20px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            box-sizing: border-box;
        }

        .primary { background: var(--cyan-accent); color: #0f172a; }
        .primary:hover:not(:disabled) { background: #67e8f9; transform: translateY(-2px); }
        .primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        .secondary { background: transparent; color: var(--cyan-accent); border: 1px solid var(--cyan-accent); margin-top: 15px; }
        .secondary:hover { background: rgba(34, 211, 238, 0.05); }

        .footer { margin-top: 30px; font-size: 0.7rem; color: #64748b; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <img src="logo.png" class="logo" alt="FRIZH" onerror="this.style.display='none'">
        <h1>FRIZH Labs</h1>
        <div class="status-badge">DIGITAL AUDIO SOLUTIONS</div>

        <div class="selection-box">
            <label>Available Software Versions</label>
            <select id="apk-dropdown">
                <option>Connecting to GitHub...</option>
            </select>
            
            <button id="dl-button" class="btn primary" disabled onclick="startDownload()">
                Download Selected APK
            </button>
        </div>

        <a href="FRIZH%20DLMS24%20Web.html" class="btn secondary">Launch Web Bluetooth UI</a>

        <div class="footer">
            Android App Requires Android 8.0+<br>
            Web Bluetooth UI Requires Chrome/Edge Browser<br>
            © 2026 FRIZH Labs
        </div>
    </div>

    <script>
        const REPO = "FRIZH-Labs/FRIZH-Labs";
        
        async function loadFiles() {
            const dropdown = document.getElementById('apk-dropdown');
            const button = document.getElementById('dl-button');
            
            try {
                // We add ?t=... to the URL to force GitHub to give us fresh data (no cache)
                const response = await fetch(`https://api.github.com/repos/${REPO}/releases?t=${Date.now()}`);
                const releases = await response.json();
                
                dropdown.innerHTML = ""; // Clear loader
                let hasFiles = false;

                releases.forEach(rel => {
                    rel.assets.forEach(asset => {
                        if (asset.name.toLowerCase().endsWith('.apk')) {
                            const opt = document.createElement('option');
                            opt.value = asset.browser_download_url;
                            // Shows: "v1.1.0 - DLMS_Control.apk"
                            opt.textContent = `${rel.tag_name} — ${asset.name}`;
                            dropdown.appendChild(opt);
                            hasFiles = true;
                        }
                    });
                });

                if (hasFiles) {
                    button.disabled = false;
                } else {
                    dropdown.innerHTML = "<option>No APKs found in public releases</option>";
                }

            } catch (e) {
                dropdown.innerHTML = "<option>Error loading files</option>";
                console.error(e);
            }
        }

        function startDownload() {
            const url = document.getElementById('apk-dropdown').value;
            if (url) window.location.href = url;
        }

        document.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRIZH Labs</title>
    <style>
        body {
            background-color: #121212;
            color: #EEEEEE;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container { text-align: center; padding: 40px; background: #1E1E1E; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        img { max-width: 120px; margin-bottom: 10px; }
        h1 { font-size: 2.2rem; letter-spacing: 3px; margin: 0; color: #00ADB5; }
        
        /* Device Info Styling */
        .device-info { margin: 25px 0; }
        .model-name { font-size: 1.2rem; font-weight: bold; color: #FFFFFF; display: block; }
        .version-tag { 
            display: inline-block; 
            background: #393E46; 
            color: #00ADB5; 
            padding: 4px 12px; 
            border-radius: 5px; 
            font-size: 0.9rem; 
            margin-top: 8px;
            border: 1px solid #00ADB5;
        }

        .download-btn {
            display: inline-block;
            background-color: #00ADB5;
            color: white;
            padding: 18px 50px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 20px;
        }
        .download-btn:hover { background-color: #008f95; transform: scale(1.05); }
        .requirements { font-size: 0.8rem; color: #777; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <img src="logo.png" alt="Frizh Logo">
        <h1>FRIZH Labs</h1>
        
        <div class="device-info">
            <span class="model-name">FRIZH DLMS24</span>
            <span class="version-tag">Version 1.0.0</span>
        </div>

        <a href="https://github.com/FRIZH-Labs/FRIZH-Labs/releases/download/v.1.0.0/DLMS.FRIZH24.apk" class="download-btn">
            Download for Android (.APK)
        </a>
        
        <p class="requirements">Requires Android 8.0 or higher</p>
    </div>
</body>
</html>
